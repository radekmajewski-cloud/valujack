const { useState, useEffect } = React;
const CARD_TYPES = {
    KING: { color: '#C0152A', symbol: '♚', corner: 'K', isGold: false, symbolColor: null, cornerColor: null },
    JACK: { color: '#1A1A1A', symbol: '♞', corner: 'J', isGold: false, symbolColor: null, cornerColor: null },
    TWO: { color: '#7A1A1A', symbol: '♠', corner: '2', isGold: false, symbolColor: 'SILVER', cornerColor: '#C8C8C8', symbolSize: '2.1rem' },
    QUEEN: { color: '#4A1A6B', symbol: '♛', corner: 'Q', isGold: true, symbolColor: 'GOLD', cornerColor: '#4A1A6B' },
    ACE: { color: '#4A1A6B', symbol: '♠', corner: 'A', isGold: true, symbolColor: 'GOLD', cornerColor: '#4A1A6B', symbolSize: '3.2rem' },
    JOKER: { color: '#4A1A6B', symbol: '★', corner: '★', isGold: true, symbolColor: 'GOLD', cornerColor: '#4A1A6B' },
};
const SILVER = 'linear-gradient(135deg,#8A8A8A 0%,#C8C8C8 25%,#E0DDDA 45%,#A9A9A9 65%,#D0CDCA 80%,#8A8A8A 100%)';
const GOLD = 'linear-gradient(135deg,#BFA882 0%,#DDBF88 22%,#A88A60 42%,#CAB07A 62%,#8C7858 80%,#C0AA75 100%)';

const cards = window.CARDS_DATA || [];

// ── METHODOLOGY: STRATEGY WEIGHTS (Phase 2A) ────────────────────────────────
// Each strategy weights Fundamentals / Context / Price differently.
// Combined weight = (Fundamentals × W_fund) + (Context × W_context) + (Price × W_price)
// Source: ValuJack_Methodology.md (9 May 2026)
const STRATEGY_WEIGHTS = {
    KING:  { fund: 1.5, context: 0.5, price: 1.5 },  // Dividend value — context = falling-knife check
    QUEEN: { fund: 1.5, context: 0.5, price: 2.0 },  // Magic Formula — price-led, context = falling-knife check
    ACE:   { fund: 2.0, context: 1.5, price: 1.0 },  // Piotroski — fundamentals-led, context validates real improvement
    JACK:  { fund: 1.0, context: 2.5, price: 0.0 },  // Minervini — context IS the strategy, price ignored
    JOKER: { fund: 2.0, context: 1.5, price: 0.5 },  // CANSLIM — growth fundamentals + market leadership
    TWO:   { fund: 1.0, context: 2.0, price: 2.5 }   // Contrarian — deep value + recovery context
};

// Fundamentals score (0–10): average of the radar axes EXCLUDING "Fair Price"
function fundamentalsScore(card) {
    if (!card || !card.scores || !Array.isArray(card.scores)) return 5;
    const axes = card.scores.filter(s => s && s.l && s.l !== "Fair Price" && typeof s.v === "number");
    if (axes.length === 0) return 5;
    return axes.reduce((sum, s) => sum + s.v, 0) / axes.length;
}

// Price score (0–10): mapped from current MoS%
function priceScore(mosPercent) {
    if (mosPercent == null || isNaN(mosPercent)) return 0;
    if (mosPercent < 0)  return 0;
    if (mosPercent < 10) return 3;
    if (mosPercent < 20) return 5;
    if (mosPercent < 30) return 7;
    if (mosPercent < 40) return 9;
    return 10;
}

// Normalize live price for unit mismatches.
// LSE (.L) stocks are quoted in pence (GBX). When Yahoo returns 356 for a £3.56 stock,
// the price needs to be divided by 100. We only correct when the ratio is clearly wrong
// (price > 10x fair value) to avoid touching legitimate prices.
function normalizePrice(rawPrice, card) {
    if (!rawPrice || !card || !card.yahooTicker) return rawPrice;
    if (card.yahooTicker.endsWith('.L') && card.fairValue && rawPrice > card.fairValue * 10) {
        return rawPrice / 100;
    }
    return rawPrice;
}

// Combined weight using the strategy multipliers
function combinedWeight(card, mosPercent) {
    const w = STRATEGY_WEIGHTS[card.type];
    if (!w) return 0;
    const f = fundamentalsScore(card);
    const c = (typeof card.contextScore === "number") ? card.contextScore : 5;
    const p = priceScore(mosPercent);
    return (f * w.fund) + (c * w.context) + (p * w.price);
}

const DEAL_ORIGINS = [

function Home() {
    var _a;
    const [flipped, setFlipped] = useState([]);

    const [prices, setPrices] = useState(initPrices);

    useEffect(() => {

        fetch('/api/chart?ticker=' + encodeURIComponent(card.yahooTicker))

    useEffect(() => {

        const fetchPrices = async () => {
            try {
                const eligibleCards = cards.filter(c => c.stars >= 3);

                // Fetch in batches of 50
                for (let i = 0; i < eligibleCards.length; i += BATCH_SIZE) {

                    if (res.ok) {
                        const data = await res.json();
                        Object.assign(allPrices, data);
                    }
                }
                
                // Map yahooTicker -> card id -> price
                const priceMap = {};
                cards.forEach(c => {
                    const yticker = c.yahooTicker;
                    if (allPrices[yticker])
                        priceMap[c.id] = allPrices[yticker];
                });
                setPrices(priceMap);
                setPriceAge(new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }));

            }

        };

        return () => {

        };
    }, []);
    const handleCardClick = (card) => {

        else {
            window.vjTrack && window.vjTrack('card_expanded', { card_type: card.type, card_ticker: card.ticker });
            setExpanded(card.id);
        }
    };
    // Filter: only show cards where live price < fair value (positive margin of safety)
    // If prices not yet loaded, show all cards
    // ── DAILY ROTATION ──────────────────────────────────────────────────────────
        // Seed based on date so same cards show all day
        const todaySeed = (function(){
          var d = new Date();
          // Use day-of-year as seed so it changes daily and keeper math works
          var start = new Date(d.getFullYear(), 0, 0);
          var diff = d - start;
          var oneDay = 86400000;
          var dayOfYear = Math.floor(diff / oneDay);
          return d.getFullYear() * 1000 + dayOfYear;
        })();
        function seededRand(seed, n) {
          // Simple LCG shuffle pick
          var picks = [];
          var s = seed;
          var arr = Array.from({length:n}, function(_,i){ return i; });
          for(var i = arr.length-1; i > 0; i--) {
            s = (s * 1664525 + 1013904223) & 0xffffffff;
            var j = Math.abs(s) % (i+1);
            var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
          }
          return arr;
        }

        // DYNAMIC FILTER: Automatically compare live price vs fair value
        // Show cards ONLY when: current_price < fair_value (undervalued)
        // Cards automatically appear/disappear as prices change
        
        const effectivePrices = { ...prices };
        cards.forEach(c => { if (c.type === 'TWO' && !effectivePrices[c.id]) effectivePrices[c.id] = { price: c.fairValue * 0.8, currency: 'USD' }; });
        const eligibleCards = cards.filter(c => {
              // PHASE 1: Manual block — admin override, drops card from rotation
              if (c.manualBlock === true) return false;

              // PHASE 1b: Weekly context BLOCK — news-based veto, expires after 14 days
              if (c.weeklyContext === 'BLOCK' && c.weeklyDate) {
                  const blockDate = new Date(c.weeklyDate);
                  const daysSince = (Date.now() - blockDate.getTime()) / (1000 * 60 * 60 * 24);
                  if (daysSince <= 14) return false;
              }

              const quote = effectivePrices[c.id];
              const currentPrice = normalizePrice(quote?.price, c);
              const fairValue = c.fairValue;
              // TEMP DISABLED:               if (!currentPrice || !fairValue) return false;

              // Minimum 3 stars to appear in rotation (TWO cards use lower threshold — contrarian strategy)
              if (c.type === 'TWO') {
                  if ((c.stars || 0) < 2) return false;
              } else {
                  if ((c.stars || 0) < 3) return false;
              }

              // KING: undervalued only (strict — dividend thesis requires price discount)
              if (c.type === 'KING') {
                  return currentPrice < fairValue;
              }

              // JACK / JOKER: momentum & growth strategies — allow up to 20% overvalued
              if (c.type === 'JACK' || c.type === 'JOKER') {
                  return currentPrice < fairValue * 1.20;
              }

              // TWO: contrarian recovery — always eligible if showing recovery signal
              if (c.type === 'TWO') {
                  return true;
              }

              // QUEEN / ACE (including mega caps): undervalued + fairly valued (up to 5% over)
              return currentPrice < fairValue * 1.05;
          });

        // STEP 1: Sort by stars descending — best cards first
        const sortedEligible = [...eligibleCards].sort((a, b) => (b.stars || 0) - (a.stars || 0));

        // STEP 2: Deduplicate by ticker — company appears only on its highest-scoring card
        // (Best Strategy Rule: since sorted by stars, first occurrence = best strategy)
        const seenTickers = new Set();
        const dedupedCards = sortedEligible.filter(c => {
            if (seenTickers.has(c.ticker)) return false;
            seenTickers.add(c.ticker);

<script>
(function(){
  var btnShown = false;

  function anim(id, delay, kf, dur) {
    setTimeout(function(){
      var el = document.getElementById(id);
      if(el) el.style.animation = (kf||'fadeUp') + ' ' + (dur||'0.9s') + ' cubic-bezier(0.22,1,0.36,1) forwards';
    }, delay);
  }

  anim('sl1', 600);
  anim('sl2', 2600);
  anim('sl3', 4600);
  anim('sl4', 5800, 'fadeIn', '0.7s');
  anim('sl5', 6300, 'scaleUp', '1s');
  setTimeout(function(){
    var btn = document.getElementById('splashBtn');
    if(btn){ btn.style.animation = 'fadeIn 0.8s ease forwards'; btnShown = true; }
    var inner = document.getElementById('splashBtnInner');
    setTimeout(function(){ if(inner) inner.style.animation = 'btnPulse 2s ease-in-out infinite'; }, 900);
  }, 7500);



})();

function dismissSplash(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  var s = document.getElementById('splash');
  s.style.animation = 'splashOut 0.55s ease forwards';
  s.style.pointerEvents = 'none';
  setTimeout(function(){
    s.style.display = 'none';
    window.showLoader();
  }, 580);
}
</script>

<script>
(function(){
  // Mobile (portrait) and desktop (landscape) image sets — same 4 scenes
  var IMAGES_MOBILE = [
    '/splash/mobile_1.jpg',
    '/splash/mobile_2.jpg',
    '/splash/mobile_3.jpg',
    '/splash/mobile_4.jpg'
  ];
  var IMAGES_DESKTOP = [
    '/splash/desktop_1.jpg',
    '/splash/desktop_2.jpg',
    '/splash/desktop_3.jpg',
    '/splash/desktop_4.jpg'
  ];
  var TEXTS = [
    'Searching your daily opportunities...',
    'Analysing your investment edge...',
    'Preparing your market insights...',
    'Finding your strongest cards today...'
  ];

  // Pick the right image set for the current viewport (desktop >= 768px)
  function imageSet() {
    return (window.innerWidth >= 768) ? IMAGES_DESKTOP : IMAGES_MOBILE;
  }

  // Pick a random index across the 4 scenes
  function dailyIndex() {
    return Math.floor(Math.random() * 4);
  }

  window.showLoader = function(onDone) {
    var idx    = dailyIndex();
    var imgs   = imageSet();
    var loader = document.getElementById('loader');
    var img    = document.getElementById('loaderImg');
    var txt    = document.getElementById('loaderText');

    img.style.backgroundImage = 'url(' + imgs[idx] + ')';
    txt.textContent = TEXTS[idx];
    // Reset text animation
    txt.style.animation = 'none';
    txt.offsetHeight; // reflow
    txt.style.animation = 'loaderTextIn 1s ease 0.5s forwards';

    loader.style.display  = 'block';
    loader.style.opacity  = '1';
    loader.style.animation = 'none';

    // After 4 seconds fade out and reveal table
    setTimeout(function(){
      loader.style.animation = 'loaderFadeOut 0.7s ease forwards';
      setTimeout(function(){
        loader.style.display = 'none';
        document.getElementById('root').style.visibility = 'visible';
        if(onDone) onDone();
      }, 700);
    }, 4000);
  };
})();
</script>
